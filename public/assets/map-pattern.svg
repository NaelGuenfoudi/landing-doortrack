<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .st0{fill:none;stroke:#64748b;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:10;}
      .st1{fill:#64748b;opacity:0.2;}
    </style>
  </defs>
  <!-- Rues principales -->
  <line class="st0" x1="0" y1="100" x2="400" y2="100"/>
  <line class="st0" x1="0" y1="300" x2="400" y2="300"/>
  <line class="st0" x1="100" y1="0" x2="100" y2="400"/>
  <line class="st0" x1="300" y1="0" x2="300" y2="400"/>
  
  <!-- Rues secondaires -->
  <line class="st0" x1="100" y1="200" x2="300" y2="200" stroke-dasharray="4 8"/>
  <line class="st0" x1="200" y1="100" x2="200" y2="300" stroke-dasharray="4 8"/>
  
  <!-- Blocs de bâtiments/zones -->
  <rect x="120" y="120" width="60" height="60" rx="4" class="st1"/>
  <rect x="220" y="120" width="60" height="60" rx="4" class="st1"/>
  <rect x="120" y="220" width="60" height="60" rx="4" class="st1"/>
  <rect x="220" y="220" width="60" height="60" rx="4" class="st1"/>
  
  <!-- Points de prospection subtils -->
  <circle cx="150" cy="150" r="3" class="st1" opacity="0.4"/>
  <circle cx="250" cy="250" r="3" class="st1" opacity="0.4"/>
  <circle cx="50" cy="50" r="2" class="st1" opacity="0.2"/>
  <circle cx="350" cy="350" r="2" class="st1" opacity="0.2"/>
</svg>
